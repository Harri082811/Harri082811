<!DOCTYPE html>
<html lang="en">
<head><link rel="manifest" href="/manifest.json"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7487249208457563"
     crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Open Sans', sans-serif; }
    .buttons { background: #1a1a1a; display: flex; align-items: center; padding: 5px 15px; color: #fff; height: 40px; position: relative; z-index: 10; }
    .buttons a { color: #fff; margin-right: 15px; font-size: 20px; cursor: pointer; text-decoration: none; }
    .buttons a:hover { opacity: 0.8; }
    .app-details { display: flex; align-items: center; flex-grow: 1; }
    #app-image { margin-right: 10px; border-radius: 5px; }
    #app-name { font-weight: bold; font-size: 14px; }
    iframe { width: 100vw; height: calc(100vh - 40px); border: none; }
    .history-controls { display: flex; align-items: center; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <title>My Drive - Google Drive</title>
  <link rel="icon" type="image/x-icon" href="assets/img/favicons/google-drive-ico.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <script>
    function backtopage() {
        window.location.href = 'games.html';
    }

    function reload() {
        const iframe = document.getElementById('iframe');
        if (iframe) {
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => { iframe.src = currentSrc; }, 10);
        }
    }

    function goBack() {
        window.location.href = 'games.html';
    }

    function toggleFullscreen() {
        // Disabled as requested
        console.log("Fullscreen is disabled.");
    }
  </script>
</head>
<body>
  <div class="buttons">
    <a class="back-arrow" onclick="backtopage()">
      <i class="fa-regular fa-square-caret-left"></i>
    </a>
    <a class="reload" onclick="reload()">
      <i class="fa-solid fa-rotate"></i>
    </a>
    <div class="app-details">
      <img id="app-image" src="" alt="App Image" width="30" height="30">
      <span id="app-name"></span>
  </div>
  <a class="fullscreen-button" style="opacity: 0.5; cursor: not-allowed;" onclick="toggleFullscreen()">
    <i class="fa-solid fa-expand fullscreen-button"></i>
  </a>
    <div class="history-controls">
      <a class="browser-back" onclick="backtopage()">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <a class="browser-forward" onclick="window.history.forward()">
        <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
    <a class="iframe-settings" onclick="">
      <i class="fa-solid fa-gear"></i>
    </a>
  </div>
  <iframe id="iframe" src="" frameborder="0" allowfullscreen allow="autoplay; fullscreen; microphone; camera; midi; geolocation; encrypted-media"></iframe>
  <input id="key-input" type="text" placeholder="Key" style="display: none;" value="]">
  <input id="website-input" type="text" placeholder="Website" style="display: none;" value="https://classroom.gooogle.com">
  <script src="assets/js/panic.js" defer></script>
  <script src="assets/js/settings/index.js" defer></script>
  <script src="assets/js/settings.js" defer></script>
  <script src="assets/js/cloak.js" defer></script>
  <script src="assets/js/fixed_iframe.js" defer></script>
  <form id="uv-form">
    <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/> 
  </form>
  <div id="settingsModal" class="modal">
    <div id="myModal" class="modal-content">
        <!-- Use the Font Awesome icon for the close button -->
        <span class="close-btn"><i class="fa-regular fa-rectangle-xmark"></i></span>
        <h2>Settings</h2>
        <div class="theme-selection">
          <label for="themeSelector">Select Theme:</label>
          <select id="themeSelector">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
          </select>
      </div>
    </div>
</div>
<script src="assets/js/modal.js" defer></script>
</body>
</html>
